---
- name: ensure compose down
  community.docker.docker_compose_v2:
    project_src: "{{ project_root }}"
    state: absent
  ignore_errors: yes
  when: compose_file.stat.exists

- name: reload nginx
  service:
    name: nginx
    state: reloaded

- name: compose down
  community.docker.docker_compose_v2:
    project_src: "{{ project_root }}"
    state: absent
  ignore_errors: yes

- name: compose up
  community.docker.docker_compose_v2:
    project_src: "{{ project_root }}"
    state: present
    pull: missing