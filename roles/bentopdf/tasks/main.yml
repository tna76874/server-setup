---
- name: Domain bestimmen mit Fehlerlogik
  set_fact:
    _domain: >-
      {%- set a = service_domain if (service_domain is defined) else None -%}
      {%- set b = nginx_domain_name if (nginx_domain_name is defined) else None -%}
      {{ raise('Beide Variablen gesetzt – Fehler') if a and b else
         raise('Keine Variable gesetzt') if (not a and not b) else
         (a or b)
      }}

- name: Beide Variablen auf den gemeinsamen Wert setzen
  set_fact:
    service_domain: "{{ _domain }}"
    nginx_domain_name: "{{ _domain }}"

- name: Fail if no domain var is set
  assert:
    that:
      - service_domain is defined or nginx_domain_name is defined
    fail_msg: "No domain variable set. Either service_domain or nginx_domain_name must be defined."

- name: Determine docker_config_project default
  set_fact:
    docker_config_project: "{{ (project_root | basename) }}"
  when: docker_config_project is not defined or docker_config_project is none

- name: Check .env file
  stat: 
    path: "{{ project_root }}/.env"
  register: env_file
  changed_when: not env_file.stat.exists
  notify:
    - init env

- name: Ensure directories
  file:
    path: "{{ item.path }}"
    owner: "{{ item.owner }}"
    state: directory
    recurse: "{{ item.r }}"
  loop:
    - { path: "{{ project_root }}", owner: "{{ server_user }}", r: "no" }

- name: Prepare BentoPDF environment variables
  set_fact:
    bentopdf_final_env: "{{ bentopdf_defaults | combine(bentopdf_custom_env | default({})) }}"

- name: init templates
  template:
    src: "{{ item.file }}"
    dest: "{{ item.destination }}"
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: "{{ item.mode }}"
  become: yes
  loop:
    - { file: "docker-compose.j2", destination: "{{ project_root }}/docker-compose.yml", owner: "{{ server_user }}", mode: "0755" }
  notify:
    - compose down
    - compose up

- name: Ensure nginx template
  template:
    src: "{{ item.file }}"
    dest: "{{ item.destination }}"
    owner: "{{ item.owner }}"
    mode: "{{ item.mode }}"
  loop:
    - { file: "nginx.j2", destination: "/etc/nginx/{{ nginx_domain_name }}.d/nginx.conf", owner: "root", mode: "0644" }
  become: yes
  when: ( nginx_domain_name != None and not traefik_enabled|default (False))
  notify:
    - reload nginx

- name: Compose restart state
  assert: { that: true, quiet: true }
  changed_when: true
  notify:
    - compose down
  when: restart_compose|bool

- name: Compose startup state
  assert: { that: true, quiet: true }
  changed_when: true
  notify:
    - compose up
  when: start_compose|bool

- name: Flush handlers
  meta: flush_handlers

